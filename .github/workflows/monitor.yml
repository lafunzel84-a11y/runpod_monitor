name: RunPod A100-SXM JP Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Check RunPod Stock
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          pip install requests
          python <<EOF
          import requests
          import os
          import json

          RUNPOD_API_KEY = os.environ["RUNPOD_API_KEY"]
          TG_TOKEN = os.environ["TG_TOKEN"]
          TG_CHAT = os.environ["TG_CHAT"]

          query = """
          {
            gpuTypes {
              id
              displayName
              memoryInGb
              gpuTypeAvailabilities {
                locationId
                stockStatus
              }
            }
          }
          """

          headers = {
              "Content-Type": "application/json",
              "Authorization": RUNPOD_API_KEY
          }

          r = requests.post(
              "https://api.runpod.io/graphql",
              json={"query": query},
              headers=headers
          )

          data = r.json()

          if "errors" in data:
              print("GraphQL Error:", data["errors"])
              exit(1)

          for gpu in data["data"]["gpuTypes"]:
              name = gpu["displayName"]

              # A100-SXM 정확히 필터
              if "A100" in name and "SXM" in name:

                  for loc in gpu["gpuTypeAvailabilities"]:
                      if loc["locationId"] == "AP-JP-1":

                          status = loc["stockStatus"]

                          if status in ["AVAILABLE", "LOW_STOCK"]:
                              msg = f"[JP] {name} → {status}"
                              print("Sending alert:", msg)

                              requests.post(
                                  f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage",
                                  data={
                                      "chat_id": TG_CHAT,
                                      "text": msg
                                  }
                              )

          EOF
