name: RunPod A100-SXM JP Safe Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Safe Stock Check
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          pip install requests
          python <<EOF
          import requests
          import os
          import time

          RUNPOD_API_KEY = os.environ["RUNPOD_API_KEY"]
          TG_TOKEN = os.environ["TG_TOKEN"]
          TG_CHAT = os.environ["TG_CHAT"]

          headers = {
              "Content-Type": "application/json",
              "Authorization": RUNPOD_API_KEY
          }

          # 1️⃣ GPU ID 찾기
          gpu_query = """
          query {
            gpuTypes {
              id
              displayName
            }
          }
          """

          r = requests.post(
              "https://api.runpod.io/graphql",
              json={"query": gpu_query},
              headers=headers
          )

          data = r.json()

          target_gpu_id = None

          for gpu in data["data"]["gpuTypes"]:
              if "A100" in gpu["displayName"] and "SXM" in gpu["displayName"]:
                  target_gpu_id = gpu["id"]

          if not target_gpu_id:
              print("A100 SXM not found.")
              exit(0)

          # 2️⃣ 배치 시도
          deploy_query = f"""
          mutation {{
            podFindAndDeployOnDemand(
              input: {{
                name: "stock-check-temp"
                gpuTypeId: "{target_gpu_id}"
                cloudType: SECURE
                gpuCount: 1
                volumeInGb: 20
                containerDiskInGb: 20
                minVcpuCount: 4
                minMemoryInGb: 16
                dockerArgs: ""
                ports: "8888/http"
                volumeMountPath: "/workspace"
                startSsh: false
                supportPublicIp: false
                dataCenterId: "AP-JP-1"
              }}
            ) {{
              id
            }}
          }}
          """

          r2 = requests.post(
              "https://api.runpod.io/graphql",
              json={"query": deploy_query},
              headers=headers
          )

          result = r2.json()

          # 3️⃣ 재고 있음 → 생성 성공
          if "errors" not in result and "data" in result:

              pod_id = result["data"]["podFindAndDeployOnDemand"]["id"]

              msg = "🔥 A100-SXM AVAILABLE in JP! (Auto-terminating)"
              print(msg)

              requests.post(
                  f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage",
                  data={
                      "chat_id": TG_CHAT,
                      "text": msg
                  }
              )

              # 4️⃣ 즉시 삭제
              terminate_query = f"""
              mutation {{
                podTerminate(input: {{ podId: "{pod_id}" }})
              }}
              """

              time.sleep(2)

              requests.post(
                  "https://api.runpod.io/graphql",
                  json={"query": terminate_query},
                  headers=headers
              )

              print("Temporary pod terminated.")

          else:
              print("Not available.")

          EOF
