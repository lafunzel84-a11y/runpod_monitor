name: RunPod A100-SXM JP Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Check RunPod Stock
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          pip install requests
          python <<EOF
          import requests
          import os
          import json

          RUNPOD_API_KEY = os.environ["RUNPOD_API_KEY"]
          TG_TOKEN = os.environ["TG_TOKEN"]
          TG_CHAT = os.environ["TG_CHAT"]

          STATE_FILE = "state.json"

          query = """
          {
            gpuTypes {
              displayName
              memoryInGb
              locations {
                id
                stockStatus
              }
            }
          }
          """

          headers = {
              "Content-Type": "application/json",
              "Authorization": f"Bearer {RUNPOD_API_KEY}"
          }

          r = requests.post(
              "https://api.runpod.io/graphql",
              json={"query": query},
              headers=headers
          )

          data = r.json()
          print(data)

          try:
              with open(STATE_FILE, "r") as f:
                  prev_state = json.load(f)
          except:
              prev_state = {}

          current_state = {}

          for gpu in data["data"]["gpuTypes"]:
              name = gpu["displayName"]

              if "A100" in name and "SXM" in name:
                  for loc in gpu["locations"]:
                      if loc["id"] == "AP-JP-1":

                          status = loc["stockStatus"]
                          key = f"{name}_JP"
                          current_state[key] = status

                          if status in ["AVAILABLE", "LOW_STOCK"]:
                              if prev_state.get(key) != status:

                                  msg = f"[JP] {name} → {status}"
                                  requests.post(
                                      f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage",
                                      data={"chat_id": TG_CHAT, "text": msg}
                                  )

          with open(STATE_FILE, "w") as f:
              json.dump(current_state, f)

          EOF
